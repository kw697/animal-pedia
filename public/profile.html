<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - Animal Pedia</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
</head>
<body data-page="profile">
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🐾</span>
        <span>Animal Pedia</span>
      </a>
      
      <ul class="nav-menu" id="mobileMenu">
        <li class="nav-item">
          <a href="index.html" class="nav-link">首页</a>
        </li>
        <li class="nav-item">
          <a href="search.html" class="nav-link">搜索</a>
        </li>
        <li class="nav-item">
          <a href="profile.html" class="nav-link">我的</a>
        </li>
      </ul>
      
      <div class="nav-user" id="navUser">
        <a href="login.html" class="btn-login">登录</a>
        <a href="register.html" class="btn-register">注册</a>
      </div>
      
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        ☰
      </button>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="main-container">
    <div class="profile-container">
      <!-- 用户信息卡片 -->
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">U</div>
        <h1 class="profile-username" id="profileUsername">用户名</h1>
        <p class="profile-joined" id="joinDate">加入于 2024年</p>
        <div class="profile-stats">
          <div class="profile-stat">
            <div class="profile-stat-number" id="favCount">0</div>
            <div class="profile-stat-label">收藏动物</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-number">22</div>
            <div class="profile-stat-label">全部动物</div>
          </div>
        </div>
      </div>

      <!-- 收藏列表 -->
      <div class="favorites-section">
        <h2 class="favorites-title">
          <span>❤️</span>
          <span>我的收藏</span>
        </h2>
        <div class="animals-grid" id="favoritesGrid">
          <!-- 收藏的动物由JS动态生成 -->
        </div>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer" id="footer">
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
