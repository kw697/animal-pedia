<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Pedia - 动物图鉴 | 探索神奇的动物世界</title>
  <meta name="description" content="一个精美的动物图鉴网站，包含22种动物的详细介绍，支持搜索、收藏和用户系统">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
</head>
<body data-page="home">
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🐾</span>
        <span>Animal Pedia</span>
      </a>
      
      <ul class="nav-menu" id="mobileMenu">
        <li class="nav-item">
          <a href="index.html" class="nav-link">首页</a>
        </li>
        <li class="nav-item">
          <a href="search.html" class="nav-link">搜索</a>
        </li>
        <li class="nav-item">
          <a href="profile.html" class="nav-link">我的</a>
        </li>
      </ul>
      
      <div class="nav-user" id="navUser">
        <a href="login.html" class="btn-login">登录</a>
        <a href="register.html" class="btn-register">注册</a>
      </div>
      
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        ☰
      </button>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="main-container">
    <div class="page-header">
      <h1 class="page-title">探索神奇的动物世界</h1>
      <p class="page-subtitle">发现来自全球各地的精彩动物，了解它们的特征、习性和栖息地</p>
    </div>

    <!-- 搜索框 -->
    <div class="search-section">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索动物名称、分类、栖息地...">
        <button class="search-btn" id="searchBtn">搜索</button>
      </div>
    </div>

    <!-- 分类筛选 -->
    <div class="category-filter" id="categoryFilter">
      <!-- 分类按钮由JS动态生成 -->
    </div>

    <!-- 动物卡片网格 -->
    <div class="animals-grid" id="animalsGrid">
      <!-- 动物卡片由JS动态生成 -->
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer" id="footer">
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
