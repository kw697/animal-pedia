<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Animal Pedia</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
</head>
<body data-page="login">
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🐾</span>
        <span>Animal Pedia</span>
      </a>
      
      <ul class="nav-menu" id="mobileMenu">
        <li class="nav-item">
          <a href="index.html" class="nav-link">首页</a>
        </li>
        <li class="nav-item">
          <a href="search.html" class="nav-link">搜索</a>
        </li>
        <li class="nav-item">
          <a href="profile.html" class="nav-link">我的</a>
        </li>
      </ul>
      
      <div class="nav-user" id="navUser">
        <a href="login.html" class="btn-login">登录</a>
        <a href="register.html" class="btn-register">注册</a>
      </div>
      
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        ☰
      </button>
    </div>
  </nav>

  <!-- 登录表单 -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">👋</div>
        <h1 class="auth-title">欢迎回来</h1>
        <p class="auth-subtitle">登录您的账号，继续探索动物世界</p>
      </div>
      
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">用户名</label>
          <input type="text" id="username" class="form-input" placeholder="请输入用户名" autocomplete="username">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <input type="password" id="password" class="form-input" placeholder="请输入密码" autocomplete="current-password">
        </div>
        
        <div class="form-error" id="errorMsg"></div>
        
        <button type="submit" class="auth-btn">登 录</button>
      </form>
      
      <div class="auth-footer">
        还没有账号？<a href="register.html">立即注册</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
